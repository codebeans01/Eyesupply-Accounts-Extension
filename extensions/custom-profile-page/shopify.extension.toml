api_version = "2026-01"

[[extensions]]
name = "custom-profile-page"
handle = "custom-profile-page"
uid = "ea664419-a2b5-5496-6389-5dc984c4dad8a8587f09"
type = "ui_extension"

[[extensions.targeting]]
module = "./src/index.tsx"
target = "customer-account.page.render"



[extensions.capabilities]
api_access = true
network_access = true



[extensions.settings]

  [[extensions.settings.fields]]
  key = "cb_welcome_image_url"
  type = "single_line_text_field"
  name = "Welcome Image URL"
  description = "Provide a URL for the welcome image (e.g. from Content > Files)."

  [[extensions.settings.fields]]
  key = "cb_review_google_url"
  type = "single_line_text_field"
  name = "Google Review URL"
  description = "URL for Google reviews"
  default = "https://g.page/r/11164121505097059976/review"

  [[extensions.settings.fields]]
  key = "cb_review_facebook_url"
  type = "single_line_text_field"
  name = "Facebook Review URL"
  description = "URL for Facebook reviews"
  default = "https://www.facebook.com/eyesupply/reviews"

  [[extensions.settings.fields]]
  key = "cb_review_target"
  type = "single_line_text_field"
  name = "Product Review Target"
  description = "Target for product reviews"
  default = "#reviews"

  [[extensions.settings.fields]]
  key = "cb_support_faq_url"
  type = "single_line_text_field"
  name = "Support FAQ URL"
  description = "URL for Support FAQ"
  default = "https://support.eyewearsystem.com/hc/en-us"

  [[extensions.settings.fields]]
  key = "cb_support_contact_url"
  type = "single_line_text_field"
  name = "Support Contact URL"
  description = "URL for Support Contact"
  default = "https://support.eyewearsystem.com/hc/en-us/requests/new"


  [[extensions.settings.fields]]
  key = "cb_reward_refferal_url"
  type = "single_line_text_field"
  name = "Refferal URL"
  description = "URL for Reward Refferal"
  default = "https://support.eyewearsystem.com/hc/en-us/requests/new"


  [[extensions.settings.fields]]
  key = "cb_reward_redeem_points_url"
  type = "single_line_text_field"
  name = "Redeem Points URL"
  description = "URL for Redeem Points"
  default = "https://support.eyewearsystem.com/hc/en-us/requests/new"

  [[extensions.settings.fields]]
  key = "exclude_trial_pack"
  type = "boolean"
  name = "Exclude Trial Pack"
  description = "If enabled, trial packs will be excluded from reorder."
  default = false

  [[extensions.settings.fields]]
  key = "exclude_variant_ids"
  type = "single_line_text_field"
  name = "Exclude Product Variant IDs"
  description = "Comma-separated list of variant IDs to exclude from reorder (e.g. 12345,67890)."
  default = ""

  [[extensions.settings.fields]]
  key = "external_reorder_link"
  type = "single_line_text_field"
  name = "External Reorder Link"
  description = "If set, the \"Click here\" action will redirect to this link instead of the default reorder behavioral logic." 

  [[extensions.settings.fields]]
  key = "cb_reorder_button_position"
  type = "single_line_text_field"
  name = "Reorder Button Position"
  description = "Position of the REORDER NOW button in the modal. Options: top_left, top_right, bottom_left, bottom_right."
  default = "bottom_right"

  [[extensions.settings.fields]]
  key = "cb_search_enable"
  type = "boolean"
  name = "Enable/Disable Search"
  description = "Enable/Disable search functionality"
  default = true