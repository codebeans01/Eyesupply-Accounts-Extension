api_version = "2026-01"

[[extensions]]
name = "customer-dependant-manager"
handle = "customer-dependant-manager"
type = "ui_extension"
uid = "67783ab3-bb94-5ac2-957e-89a99f2ea94d8515843b"

# Order Status page — shows dependants attached to the order
[[extensions.targeting]]
module = "./src/OrderStatusBlock.tsx"
target = "customer-account.order-status.block.render"

# Profile page — lists & adds dependants (Dynamic Block)
[[extensions.targeting]]
module = "./src/ProfileBlock.tsx"
target = "customer-account.profile.block.render"

# Profile page - Static fallback
[[extensions.targeting]]
module = "./src/ProfileBlock.tsx"
target = "customer-account.profile.addresses.render-after"

[[extensions.metafields]]
namespace = "custom"
key = "dependants"

[extensions.capabilities]
api_access = true
# Required for fetch() to App Proxy (/apps/eyesupply/...)
network_access = true

[extensions.settings]

  [[extensions.settings.fields]]
  key = "pagination_previous_text"
  type = "single_line_text_field"
  name = "Previous Button Text"

  [[extensions.settings.fields]]
  key = "pagination_next_text"
  type = "single_line_text_field"
  name = "Next Button Text"

  [[extensions.settings.fields]]
  key = "pagination_enabled"
  type = "boolean"
  name = "Enable Pagination"

